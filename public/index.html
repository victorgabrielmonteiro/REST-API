<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="script.js">  </script>
</head>
<body>
    <div class="container">
<div class="login">
    <input placeholder="Email" type="email" autocomplete="email" id="email" class="select">
    <input placeholder="Senha" type="password" name="" id="password" class="select">
    <button type="button" id="loginButton" class="select">Login</button>

    <a href="http://localhost:3000/sign-up">Não possui uma conta?</a>
    
    <div id="returnLogin"></div>
</div>
</div>


</body>
</html>
